<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Member</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #444;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: #007bff;
      color: #fff;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
    .message {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      white-space: pre-line; /* preserve line breaks */
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Edit Member</h2>
    <form id="editMemberForm">
      <input type="hidden" name="memberId" value="13">

      <label for="memberFirstName">First Name</label>
      <input type="text" id="memberFirstName" name="memberFirstName" required>

      <label for="memberMiddleName">Middle Name</label>
      <input type="text" id="memberMiddleName" name="memberMiddleName">

      <label for="memberLastName">Last Name</label>
      <input type="text" id="memberLastName" name="memberLastName" required>

      <label for="memberEmail">Email</label>
      <input type="email" id="memberEmail" name="memberEmail" required>

      <label for="memberAddressLine1">Address Line 1</label>
      <input type="text" id="memberAddressLine1" name="memberAddressLine1" required>

      <label for="memberAddressLine2">Address Line 2</label>
      <input type="text" id="memberAddressLine2" name="memberAddressLine2">

      <label for="memberMobileNumber">Mobile Number</label>
      <input type="tel" id="memberMobileNumber" name="memberMobileNumber" pattern="[0-9]{10}" required>

      <label for="memberWorkStatus">Work Status</label>
      <select id="memberWorkStatus" name="memberWorkStatus">
        <option value="STUD">Student</option>
        <option value="EMP">Employee</option>
      </select>

      <label for="membershipPeriod">Membership Period (Years)</label>
      <input type="number" id="membershipPeriod" name="membershipPeriod" min="1" required>

      <label for="memberDob">Date of Birth</label>
      <input type="date" id="memberDob" name="memberDob" required>

      <button type="submit">Save Member</button>
    </form>
    <div class="message" id="responseMessage"></div>
  </div>

  <script>
    document.getElementById("editMemberForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const formData = {
        memberId: document.querySelector("[name='memberId']").value,
        memberFirstName: document.getElementById("memberFirstName").value,
        memberMiddleName: document.getElementById("memberMiddleName").value,
        memberLastName: document.getElementById("memberLastName").value,
        memberEmail: document.getElementById("memberEmail").value,
        memberAddressLine1: document.getElementById("memberAddressLine1").value,
        memberAddressLine2: document.getElementById("memberAddressLine2").value,
        memberMobileNumber: document.getElementById("memberMobileNumber").value,
        memberWorkStatus: document.getElementById("memberWorkStatus").value,
        membershipPeriod: document.getElementById("membershipPeriod").value,
        memberDob: document.getElementById("memberDob").value // YYYY-MM-DD
      };

      try {
        const response = await fetch("https://dev-api.humhealth.com/LibraryManagementAPI/members/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData)
        });

        // Capture raw response text
        let resultText = await response.text();
        let result;
        try {
          result = JSON.parse(resultText);
        } catch {
          result = { status: "Error", message: "Non‑JSON response", raw: resultText };
        }

        const msgBox = document.getElementById("responseMessage");
        if (result.status === "Success") {
          msgBox.textContent = result.message;
          msgBox.style.color = "green";
        } else {
          msgBox.textContent = "Server returned: " + (result.message || "Error") + 
                               "\n\nRaw response:\n" + (result.raw || resultText);
          msgBox.style.color = "red";
        }

        console.log("Raw response:", resultText);
        console.log("Parsed result:", result);

      } catch (error) {
        const msgBox = document.getElementById("responseMessage");
        msgBox.textContent = "Fetch error: " + error.message;
        msgBox.style.color = "red";
        console.error("Network/Fetch error:", error);
      }
    });
  </script>
</body>
</html>
