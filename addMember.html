<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Member | Library Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 28px;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .header h1 {
      color: white;
      font-size: 1.8rem;
    }

    .form-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .form-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem 1.5rem;
    }

    .form-body {
      padding: 1.8rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
    }

    .form-group {
      margin-bottom: 0.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6c7a91;
      margin-bottom: 0.4rem;
    }

    .required {
      color: #e53e3e;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group input.error, .form-group select.error {
      border-color: #e53e3e;
      background: #fff5f5;
    }

    .error-message {
      font-size: 0.7rem;
      color: #e53e3e;
      margin-top: 0.3rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .full-width {
      grid-column: span 2;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 1.5rem;
    }

    .btn-save:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      display: none;
    }

    .message.success {
      background: #e0f2e9;
      color: #1a4d3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .message.error {
      background: #ffe6e5;
      color: #a12218;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      text-align: center;
      width: 100%;
      color: #667eea;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-user-plus"></i> Add New Member</h1>
    <p>Register a new member to the library system</p>
  </div>

  <div class="form-card">
    <div class="form-header">
      <h2><i class="fas fa-address-card"></i> Member Registration Form</h2>
    </div>
    <div class="form-body">
      <form id="saveMemberForm">
        <input type="hidden" name="memberId" value="">

        <div class="form-grid">
          <div class="form-group">
            <label>First Name <span class="required">*</span></label>
            <input type="text" id="memberFirstName" placeholder="Enter first name">
            <div class="error-message" id="firstNameError"></div>
          </div>

          <div class="form-group">
            <label>Middle Name</label>
            <input type="text" id="memberMiddleName" placeholder="Enter middle name">
          </div>

          <div class="form-group">
            <label>Last Name <span class="required">*</span></label>
            <input type="text" id="memberLastName" placeholder="Enter last name">
            <div class="error-message" id="lastNameError"></div>
          </div>

          <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" id="memberEmail" placeholder="example@email.com">
            <div class="error-message" id="emailError"></div>
          </div>

          <div class="form-group">
            <label>Mobile Number <span class="required">*</span></label>
            <input type="tel" id="memberMobileNumber" placeholder="10 digit mobile number">
            <div class="error-message" id="mobileError"></div>
          </div>

          <div class="form-group">
            <label>Date of Birth <span class="required">*</span></label>
            <input type="date" id="memberDob">
            <div class="error-message" id="dobError"></div>
          </div>

          <div class="form-group full-width">
            <label>Address Line 1 <span class="required">*</span></label>
            <input type="text" id="memberAddressLine1" placeholder="Street address">
            <div class="error-message" id="address1Error"></div>
          </div>

          <div class="form-group full-width">
            <label>Address Line 2</label>
            <input type="text" id="memberAddressLine2" placeholder="Apartment, suite, etc.">
          </div>

          <div class="form-group">
            <label>Work Status <span class="required">*</span></label>
            <select id="memberWorkStatus">
              <option value="STUD">Student</option>
              <option value="EMP">Employee</option>
            </select>
          </div>

          <div class="form-group">
            <label>Membership Period <span class="required">*</span></label>
            <select id="membershipPeriod">
              <option value="1">1 Month</option>
              <option value="3">3 Months</option>
              <option value="6">6 Months</option>
              <option value="12">12 Months</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-save" id="saveBtn">
          <i class="fas fa-save"></i> Register Member
        </button>
      </form>

      <div id="messageArea" class="message"></div>
      <a href="admindashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
  </div>
</div>

<script>
  // Use LOCAL BACKEND as proxy to avoid CORS
  const LOCAL_API_URL = "http://localhost:8080/api/members/save";

  function showMessage(text, type) {
    const msgDiv = document.getElementById('messageArea');
    msgDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${text}`;
    msgDiv.className = `message ${type}`;
    msgDiv.style.display = 'flex';
    
    setTimeout(() => {
      msgDiv.style.display = 'none';
    }, 5000);
  }

  function clearErrors() {
    document.querySelectorAll('.error-message').forEach(el => {
      el.classList.remove('show');
      el.textContent = '';
    });
    document.querySelectorAll('input, select').forEach(el => {
      el.classList.remove('error', 'success');
    });
  }

  function showFieldError(fieldId, message) {
    const errorDiv = document.getElementById(`${fieldId}Error`);
    const inputField = document.getElementById(fieldId);
    if (errorDiv) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
    if (inputField) {
      inputField.classList.add('error');
    }
  }

  function showFieldSuccess(fieldId) {
    const inputField = document.getElementById(fieldId);
    if (inputField) {
      inputField.classList.remove('error');
    }
  }

  function validateFirstName() {
    const value = document.getElementById('memberFirstName').value.trim();
    if (!value) {
      showFieldError('memberFirstName', 'First name is required');
      return false;
    } else if (!/^[a-zA-Z\s]+$/.test(value)) {
      showFieldError('memberFirstName', 'Only letters allowed');
      return false;
    } else if (value.length < 2) {
      showFieldError('memberFirstName', 'Minimum 2 characters');
      return false;
    }
    showFieldSuccess('memberFirstName');
    return true;
  }

  function validateLastName() {
    const value = document.getElementById('memberLastName').value.trim();
    if (!value) {
      showFieldError('memberLastName', 'Last name is required');
      return false;
    } else if (!/^[a-zA-Z\s]+$/.test(value)) {
      showFieldError('memberLastName', 'Only letters allowed');
      return false;
    }
    showFieldSuccess('memberLastName');
    return true;
  }

  function validateEmail() {
    const value = document.getElementById('memberEmail').value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!value) {
      showFieldError('memberEmail', 'Email is required');
      return false;
    } else if (!emailRegex.test(value)) {
      showFieldError('memberEmail', 'Enter valid email');
      return false;
    }
    showFieldSuccess('memberEmail');
    return true;
  }

  function validateMobile() {
    const value = document.getElementById('memberMobileNumber').value.trim();
    if (!value) {
      showFieldError('memberMobileNumber', 'Mobile number is required');
      return false;
    } else if (!/^\d{10}$/.test(value)) {
      showFieldError('memberMobileNumber', 'Must be 10 digits');
      return false;
    } else if (!/^[6-9]/.test(value)) {
      showFieldError('memberMobileNumber', 'Must start with 6,7,8,9');
      return false;
    }
    showFieldSuccess('memberMobileNumber');
    return true;
  }

  function validateDOB() {
    const value = document.getElementById('memberDob').value;
    if (!value) {
      showFieldError('memberDob', 'Date of birth is required');
      return false;
    }
    const dob = new Date(value);
    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    const monthDiff = today.getMonth() - dob.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
      age--;
    }
    if (age < 18) {
      showFieldError('memberDob', 'Must be at least 18 years old');
      return false;
    }
    showFieldSuccess('memberDob');
    return true;
  }

  function validateAddress() {
    const value = document.getElementById('memberAddressLine1').value.trim();
    if (!value) {
      showFieldError('memberAddressLine1', 'Address is required');
      return false;
    }
    showFieldSuccess('memberAddressLine1');
    return true;
  }

  document.getElementById('memberFirstName').addEventListener('input', validateFirstName);
  document.getElementById('memberLastName').addEventListener('input', validateLastName);
  document.getElementById('memberEmail').addEventListener('input', validateEmail);
  document.getElementById('memberMobileNumber').addEventListener('input', validateMobile);
  document.getElementById('memberDob').addEventListener('change', validateDOB);
  document.getElementById('memberAddressLine1').addEventListener('input', validateAddress);

  function validateForm() {
    return validateFirstName() && validateLastName() && validateEmail() && 
           validateMobile() && validateDOB() && validateAddress();
  }

  document.getElementById("saveMemberForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    
    if (!validateForm()) {
      showMessage("Please fix the errors in the form", "error");
      return;
    }
    
    const formData = {
      memberId: "",
      memberFirstName: document.getElementById("memberFirstName").value.trim(),
      memberMiddleName: document.getElementById("memberMiddleName").value.trim(),
      memberLastName: document.getElementById("memberLastName").value.trim(),
      memberEmail: document.getElementById("memberEmail").value.trim(),
      memberAddressLine1: document.getElementById("memberAddressLine1").value.trim(),
      memberAddressLine2: document.getElementById("memberAddressLine2").value.trim(),
      memberMobileNumber: document.getElementById("memberMobileNumber").value.trim(),
      memberWorkStatus: document.getElementById("memberWorkStatus").value,
      membershipPeriod: document.getElementById("membershipPeriod").value,
      memberDob: document.getElementById("memberDob").value
    };
    
    console.log("Sending to local backend:", formData);
    
    const saveBtn = document.getElementById("saveBtn");
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="loading-spinner"></span> Registering...';
    
    try {
      const response = await fetch(LOCAL_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      });
      
      const result = await response.json();
      console.log("Response:", result);
      
      if (result.status === "Success") {
        showMessage(`✅ ${result.message || "Member registered successfully!"}`, "success");
        document.getElementById("saveMemberForm").reset();
        clearErrors();
        
        setTimeout(() => {
          window.location.href = 'admindashboard.html';
        }, 2000);
      } else {
        showMessage(`❌ ${result.message || "Registration failed"}`, "error");
      }
    } catch (error) {
      console.error("Error:", error);
      showMessage(`❌ Error: ${error.message}`, "error");
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerHTML = '<i class="fas fa-save"></i> Register Member';
    }
  });
</script>
</body>
</html>
