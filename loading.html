<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System | Loading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Background Image with Overlay */
        .splash-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('backimg.jpg'); /* Replace with your image path */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: zoomIn 8s ease-out;
        }

        /* Dark Overlay for better text visibility */
        .splash-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        /* Content Box */
        .splash-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 2rem;
            animation: fadeInUp 1.5s ease-out;
        }

        /* Logo/Icon */
        .logo-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }

        .logo-icon i {
            background: linear-gradient(135deg, #ff6c37, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255,108,55,0.3);
        }

        /* Title */
        .splash-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .splash-subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* Loading Bar */
        .loading-wrapper {
            width: 300px;
            max-width: 80%;
            margin: 0 auto;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff6c37, #ffb347);
            border-radius: 4px;
            animation: loadProgress 3s ease-out forwards;
        }

        .loading-text {
            font-size: 0.8rem;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .loading-percent {
            font-weight: 600;
            color: #ff6c37;
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse 1.5s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }

        /* Version Info */
        .version-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            z-index: 2;
        }

        /* Animations */
        @keyframes zoomIn {
            from {
                transform: scale(1.1);
            }
            to {
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes loadProgress {
            0% {
                width: 0%;
            }
            20% {
                width: 15%;
            }
            40% {
                width: 35%;
            }
            60% {
                width: 65%;
            }
            80% {
                width: 85%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        /* Quote Section */
        .quote-section {
            margin-top: 2rem;
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.8;
        }

        /* Tip Section */
        .tip-section {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .splash-title {
                font-size: 2rem;
            }
            .logo-icon {
                font-size: 3.5rem;
            }
            .loading-wrapper {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splashContainer">
        <div class="splash-content">
            <div class="logo-icon">
                <i class="fas fa-book-open"></i>
            </div>
            <h1 class="splash-title">LibraRead</h1>
            <p class="splash-subtitle">Your Personal Library Assistant</p>
            
            <div class="loading-wrapper">
                <div class="loading-bar">
                    <div class="loading-progress" id="loadingProgress"></div>
                </div>
                <div class="loading-text">
                    <span id="loadingMessage">Initializing System...</span>
                    <span class="loading-percent" id="loadingPercent">0%</span>
                </div>
                <div class="loading-dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <div class="quote-section">
                <i class="fas fa-quote-left"></i>
                <span id="quoteText">A room without books is like a body without a soul.</span>
                <i class="fas fa-quote-right"></i>
                <p style="font-size:0.7rem; margin-top:0.3rem;">- Marcus Tullius Cicero</p>
            </div>

            <div class="tip-section">
                <i class="fas fa-lightbulb"></i> Tip: <span id="tipText">Books must be returned within 10 days to avoid penalties</span>
            </div>
        </div>
        <div class="version-info">
            <span>Version 2.0 | Library Management System © 2026</span>
        </div>
    </div>

    <script>
        // Loading messages array
        const loadingMessages = [
            "Initializing System...",
            "Loading Modules...",
            "Connecting to Database...",
            "Fetching Books...",
            "Loading Member Data...",
            "Checking Rentals...",
            "Updating Penalties...",
            "Almost Ready...",
            "Welcome to LibraRead!"
        ];

        const quotes = [
            { text: "A room without books is like a body without a soul.", author: "Marcus Tullius Cicero" },
            { text: "Books are a uniquely portable magic.", author: "Stephen King" },
            { text: "The more that you read, the more things you will know.", author: "Dr. Seuss" },
            { text: "Reading is to the mind what exercise is to the body.", author: "Joseph Addison" },
            { text: "A library is a hospital for the mind.", author: "Anonymous" },
            { text: "Today a reader, tomorrow a leader.", author: "Margaret Fuller" }
        ];

        const tips = [
            "Books must be returned within 10 days to avoid penalties",
            "You can renew a book once for an additional 5 days",
            "Missing books incur full price penalty",
            "Damaged books incur half price penalty",
            "Active members can borrow up to 5 books at a time",
            "Overdue books are charged 10% of book price per day"
        ];

        let currentProgress = 0;
        let messageIndex = 0;
        const progressInterval = setInterval(updateProgress, 150);

        function updateProgress() {
            if (currentProgress < 100) {
                currentProgress += Math.floor(Math.random() * 5) + 2;
                if (currentProgress > 100) currentProgress = 100;
                
                document.getElementById('loadingPercent').textContent = currentProgress + '%';
                
                // Update message based on progress
                const messageIndex = Math.floor(currentProgress / 12);
                if (messageIndex < loadingMessages.length) {
                    document.getElementById('loadingMessage').textContent = loadingMessages[messageIndex];
                }
                
                // Update progress bar width
                const progressBar = document.getElementById('loadingProgress');
                if (progressBar) {
                    progressBar.style.width = currentProgress + '%';
                }
            } else {
                clearInterval(progressInterval);
                // Load complete - redirect to dashboard
                setTimeout(() => {
                    document.getElementById('loadingMessage').textContent = "Redirecting to Dashboard...";
                    setTimeout(() => {
                        window.location.href = 'role-selection.html';
                    }, 500);
                }, 500);
            }
        }

        // Random quote on load
        function setRandomQuote() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quoteText').textContent = randomQuote.text;
            const quoteAuthor = document.querySelector('.quote-section p');
            if (quoteAuthor) {
                quoteAuthor.innerHTML = `- ${randomQuote.author}`;
            }
        }

        // Random tip
        function setRandomTip() {
            const randomTip = tips[Math.floor(Math.random() * tips.length)];
            document.getElementById('tipText').textContent = randomTip;
        }

        // Parallax effect on mouse move (optional)
        document.addEventListener('mousemove', function(e) {
            const container = document.getElementById('splashContainer');
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            const moveX = (mouseX - 0.5) * 20;
            const moveY = (mouseY - 0.5) * 20;
            container.style.transform = `scale(1.02) translate(${moveX * 0.02}px, ${moveY * 0.02}px)`;
        });

        // Initialize
        setRandomQuote();
        setRandomTip();
    </script>
</body>
</html>
